<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SAHABAT SFX - Donasi</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:
linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.65)),
url('1000031100.jpg');

background-size:cover;
background-position:center;
background-repeat:no-repeat;
background-attachment:fixed;

color:white;
overflow-x:hidden;

}

.container{
width:100%;
max-width:1200px;
margin:auto;
padding:40px 20px;
}

.header{
text-align:center;
margin-bottom:40px;
}

.header h1{

font-size:70px;
font-weight:800;

background:linear-gradient(90deg,#32d67d,#ffffff);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

}

.header p{
color:#f1f1f1;
margin-top:10px;
font-size:18px;
}

.grid{
display:grid;
grid-template-columns:350px 1fr;
gap:20px;
}

.card{

background:rgba(8,8,8,0.45);

backdrop-filter:blur(10px);

border:1px solid rgba(255,255,255,0.08);

border-radius:26px;

padding:25px;

box-shadow:0 0 30px rgba(0,0,0,0.35);

}

.card h2{
margin-bottom:20px;
font-size:30px;
}

.payment{

display:flex;
align-items:center;
gap:15px;

background:rgba(255,255,255,0.04);

border-radius:18px;

padding:16px;
margin-bottom:16px;

}

.payment img{

width:65px;
height:65px;

background:white;

border-radius:14px;

padding:8px;

}

.payment h3{
font-size:24px;
color:#4cff91;
}

.payment p{
color:#ececec;
margin-top:4px;
}

.form-group{
margin-bottom:20px;
}

.form-group label{
display:block;
margin-bottom:10px;
color:#ffffff;
font-size:15px;
}

.form-group input,
.form-group textarea,
.form-group select{

width:100%;

padding:16px;

border:none;
outline:none;

background:rgba(0,0,0,0.35);

border:1px solid rgba(255,255,255,0.08);

border-radius:16px;

color:white;
font-size:15px;

}

textarea{
resize:none;
height:120px;
}

.nominal-buttons{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-top:10px;
}

.nominal-btn{

padding:12px 22px;

border-radius:14px;

border:1px solid rgba(47,201,94,0.45);

background:rgba(0,0,0,0.35);

color:white;

cursor:pointer;

transition:0.3s;

}

.nominal-btn:hover,
.nominal-btn.active{

background:linear-gradient(135deg,#0d5f3d,#178754);

border-color:#32d67d;

}

.submit-btn{

width:100%;

padding:18px;

border:none;

border-radius:18px;

background:linear-gradient(135deg,#0d5f3d,#178754);

color:white;

font-size:18px;
font-weight:600;

cursor:pointer;

transition:0.3s;

box-shadow:0 0 15px rgba(23,135,84,0.35);

}

.submit-btn:hover{

transform:scale(1.02);

background:linear-gradient(135deg,#178754,#21b26b);

}

.donatur-list{
margin-top:25px;
}

.donatur{

display:flex;
justify-content:space-between;
align-items:center;

background:rgba(255,255,255,0.04);

border-radius:18px;

padding:18px;

margin-bottom:15px;

border:1px solid rgba(255,255,255,0.05);

}

.donatur-left{
display:flex;
align-items:center;
gap:15px;
}

.avatar{

width:55px;
height:55px;

border-radius:50%;

background:linear-gradient(135deg,#0d5f3d,#178754);

display:flex;
align-items:center;
justify-content:center;

font-weight:bold;

}

.nominal{

color:#57ff88;

font-weight:700;

font-size:20px;

}

.small{

color:#e0e0e0;

margin-top:4px;

font-size:14px;

}

.footer{

margin-top:30px;

text-align:center;

color:#f0f0f0;

padding:30px;

}

@media(max-width:900px){

.grid{
grid-template-columns:1fr;
}

.header h1{
font-size:48px;
}

.donatur{
flex-direction:column;
gap:15px;
align-items:flex-start;
}

}

</style>
</head>

<body>

<div class="container">

<div class="header">

<h1>SAHABAT SFX</h1>

<p>
Terima kasih sudah mendukung perjalanan dan perkembangan komunitas SFX 💚
</p>

</div>

<div class="grid">

<div>

<div class="card">

<h2>Metode dukungan</h2>

<div class="payment">

<img src="https://upload.wikimedia.org/wikipedia/commons/8/86/Gopay_logo.svg">

<div>
<h3>GoPay</h3>
<p>085261616060</p>
</div>

</div>

<div class="payment">

<img src="https://upload.wikimedia.org/wikipedia/commons/5/5c/Bank_Central_Asia.svg">

<div>
<h3>Bank BCA</h3>
<p>1751195350</p>
</div>

</div>

<div class="payment">

<img src="https://upload.wikimedia.org/wikipedia/commons/5/55/Bank_Syariah_Indonesia.svg">

<div>
<h3>Bank BSI</h3>
<p>1059612472</p>
</div>

</div>

</div>

</div>

<div class="card">

<h2>Form dukungan</h2>

<div class="form-group">

<label>Nama Donatur</label>

<input type="text" id="nama" placeholder="Masukkan nama">

</div>

<div class="form-group">

<label>Pilih Nominal</label>

<div class="nominal-buttons">

<button class="nominal-btn" onclick="setNominal(5000,event)">5K</button>

<button class="nominal-btn" onclick="setNominal(10000,event)">10K</button>

<button class="nominal-btn" onclick="setNominal(20000,event)">20K</button>

<button class="nominal-btn" onclick="setNominal(50000,event)">50K</button>

<button class="nominal-btn" onclick="setNominal(100000,event)">100K</button>

</div>

</div>

<div class="form-group">

<label>Atau Nominal Bebas</label>

<input type="number" id="nominal" placeholder="Contoh: 25000">

</div>

<div class="form-group">

<label>Metode Pembayaran</label>

<select id="metode">

<option>GoPay</option>
<option>BCA</option>
<option>BSI</option>

</select>

</div>

<div class="form-group">

<label>Pesan</label>

<textarea id="pesan" placeholder="Tulis pesan untuk Sahabat SFX"></textarea>

</div>

<button class="submit-btn" onclick="donasi()">

Saya Sudah Support Sfx

</button>

</div>

</div>

<div class="card donatur-list">

<h2>Sahabat SFX Yang Sudah Support</h2>

<div id="listDonasi"></div>

</div>

<div class="footer">

💚 Terima kasih atas dukungan terbaik Anda

</div>

</div>

<audio id="bgMusic" autoplay loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<audio id="clickSound">
<source src="click.mp3" type="audio/mpeg">
</audio>

<script>

function setNominal(value,event){

document.getElementById("nominal").value = value;

document.querySelectorAll('.nominal-btn').forEach(btn=>{

btn.classList.remove('active');

});

event.target.classList.add('active');

}

</script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

getDatabase,
ref,
push,
onValue

} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";


const firebaseConfig = {

apiKey: "AIzaSyBdZk7FK3pdoMvgJjv1oRAn2-sZg3EFA7Y",

authDomain: "sahabat-sfx.firebaseapp.com",

databaseURL: "https://sahabat-sfx-default-rtdb.asia-southeast1.firebasedatabase.app",

projectId: "sahabat-sfx",

storageBucket: "sahabat-sfx.firebasestorage.app",

messagingSenderId: "537113825313",

appId: "1:537113825313:web:9a197af50d493c7b721360",

measurementId: "G-V8GF1SNLQN"

};


const app = initializeApp(firebaseConfig);

const db = getDatabase(app);


function formatRupiah(angka){

return new Intl.NumberFormat('id-ID',{

style:'currency',
currency:'IDR'

}).format(angka);

}


const ucapan = [

"Terima kasih atas dukungannya 💚",

"Semoga rezekinya lancar selalu ✨",

"Support kamu sangat berarti 🙏",

"Terima kasih sudah membantu Sahabat SFX 🚀",

"Semoga segala kebaikan kembali kepada kamu 💚"

];


window.donasi = function(){

const nama = document.getElementById('nama').value || "Anonymous";

const nominal = document.getElementById('nominal').value;

const metode = document.getElementById('metode').value;

const pesan = document.getElementById('pesan').value;

if(!nominal){

alert("Masukkan nominal donasi");

return;

}

const randomUcapan = ucapan[Math.floor(Math.random()*ucapan.length)];

push(ref(db,"donasi"),{

nama:nama,
nominal:Number(nominal),
metode:metode,
pesan:pesan || randomUcapan,
waktu:Date.now()

});


fetch("https://formsubmit.co/ajax/samudraprofx@gmail.com", {

method:"POST",

headers:{
'Content-Type':'application/json',
'Accept':'application/json'
},

body:JSON.stringify({

nama:nama,
nominal:nominal,
metode:metode,
pesan:pesan

})

});


alert(randomUcapan);

document.getElementById('nama').value = "";

document.getElementById('nominal').value = "";

document.getElementById('pesan').value = "";

};


const listDonasi = document.getElementById("listDonasi");

onValue(ref(db,"donasi"),(snapshot)=>{

listDonasi.innerHTML = "";

let data = [];

snapshot.forEach((child)=>{

data.push(child.val());

});

data.sort((a,b)=> b.nominal - a.nominal);

data.forEach((item)=>{

const html = `

<div class="donatur">

<div class="donatur-left">

<div class="avatar">

${item.nama.charAt(0).toUpperCase()}

</div>

<div>

<h3>${item.nama}</h3>

<p class="small">

${item.pesan}

</p>

</div>

</div>

<div>

<div class="nominal">

${formatRupiah(item.nominal)}

</div>

</div>

</div>

`;

listDonasi.innerHTML += html;

});

});


window.addEventListener("load", ()=>{

const music = document.getElementById("bgMusic");

music.volume = 0.6;

const playMusic = ()=>{

music.play().catch(()=>{});

document.removeEventListener("click", playMusic);

document.removeEventListener("touchstart", playMusic);

};

document.addEventListener("click", playMusic);

document.addEventListener("touchstart", playMusic);

});


document.querySelectorAll("button").forEach(button=>{

button.addEventListener("click", ()=>{

const click = document.getElementById("clickSound");

click.currentTime = 0;

click.volume = 1;

click.play();

});

});

</script>

</body>
</html>
